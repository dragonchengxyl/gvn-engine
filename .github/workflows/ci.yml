name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  # ── Job 1: Pure-Go Tests (no X11 / GPU needed) ──────────────────────────
  test-pure:
    name: Pure-Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Test pure-Go packages
        run: |
          go test \
            ./internal/compiler/ \
            ./internal/history/ \
            ./internal/headless/ \
            -v -count=1

  # ── Job 2: Ebiten Tests (needs X11 via Xvfb + software GL) ──────────────
  test-ebiten:
    name: Ebiten Tests (Xvfb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install Ebitengine Linux dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-dev libgl1-mesa-dri \
            libx11-dev libxcursor-dev libxi-dev \
            libxinerama-dev libxrandr-dev libxxf86vm-dev \
            libasound2-dev xvfb

      - name: Test ebiten packages (virtual display + software GL)
        run: xvfb-run -a go test ./internal/ecs/ ./internal/engine/ -v -count=1
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          MESA_GL_VERSION_OVERRIDE: "3.3"

  # ── Job 3: Headless Script Validation (no X11 needed) ───────────────────
  validate-script:
    name: Headless Script Validation
    runs-on: ubuntu-latest
    needs: test-pure
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      # cmd/headless imports only gvn-engine (embed) + internal/headless — no ebiten
      - name: Build headless validator
        run: CGO_ENABLED=0 go build -o gvn-headless ./cmd/headless

      - name: Validate demo script
        run: ./gvn-headless -script scripts/demo.json

  # ── Job 4: Cross-compile Windows .exe ───────────────────────────────────
  build-windows:
    name: Build Windows .exe
    runs-on: ubuntu-latest
    needs: test-pure
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Cross-compile Windows .exe
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
          go build -ldflags="-s -w" -o gvn-engine.exe ./cmd/game

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: gvn-engine-windows
          path: gvn-engine.exe
          retention-days: 30

  # ── Job 5: Android APK (self-hosted runner, opt-in) ──────────────────────
