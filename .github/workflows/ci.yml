name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

# Reusable step: install Linux graphics/audio headers required by Ebitengine v2
# (opengl/glfw driver on Linux uses CGO and needs these headers to compile)
env:
  EBITEN_LINUX_DEPS: >-
    libgl1-mesa-dev
    libx11-dev
    libxcursor-dev
    libxi-dev
    libxinerama-dev
    libxrandr-dev
    libxxf86vm-dev
    libasound2-dev

jobs:
  # ── Job 1: Unit Tests ────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install Ebitengine Linux dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ${{ env.EBITEN_LINUX_DEPS }}

      - name: Run tests
        run: |
          go test \
            ./internal/compiler/ \
            ./internal/history/ \
            ./internal/ecs/ \
            ./internal/engine/ \
            -v -count=1

  # ── Job 2: Headless Script Validation ───────────────────────────────────
  validate-script:
    name: Headless Script Validation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install Ebitengine Linux dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ${{ env.EBITEN_LINUX_DEPS }}

      - name: Build headless Linux binary
        run: go build -o gvn-engine-headless ./cmd/game

      - name: Validate demo script (headless)
        run: ./gvn-engine-headless -headless -script scripts/demo.json

  # ── Job 3: Cross-compile Windows .exe ───────────────────────────────────
  # Cross-compilation to Windows uses CGO_ENABLED=0 which skips all Linux-
  # specific CGO code, so no X11/GL headers are needed here.
  build-windows:
    name: Build Windows .exe
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Cross-compile Windows .exe
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
          go build -ldflags="-s -w" -o gvn-engine.exe ./cmd/game

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: gvn-engine-windows
          path: gvn-engine.exe
          retention-days: 30

  # ── Job 4: Android APK (requires ebitenmobile + Android NDK) ────────────
  # Runs on a self-hosted runner with Android SDK/NDK pre-installed.
  # To enable: uncomment and add a runner tagged "android".
