name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:  # 允许在 GitHub Actions 页面手动点击触发

# Grant write access for artifact uploads (needed for Dependabot PRs too)
permissions:
  contents: read
  actions: write

jobs:
  # ── Job 1: Unit Tests ────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Use major.minor only — patch version in go.mod may not exist as a
          # standalone toolchain download on the runner.
          go-version: '1.25'
          cache: true

      # ebiten's purego mode compiles without X11 headers when CGO is disabled.
      # Our test packages never call ebiten at runtime, so this is safe.
      - name: Run tests (CGO_ENABLED=0 avoids X11 dep on Ubuntu runners)
        run: |
          CGO_ENABLED=0 go test \
            ./internal/compiler/ \
            ./internal/history/ \
            ./internal/ecs/ \
            ./internal/engine/ \
            -v -count=1

  # ── Job 2: Headless Script Validation ───────────────────────────────────
  validate-script:
    name: Headless Script Validation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      # CGO_ENABLED=0 → uses ebiten purego mode; no X11 needed at runtime
      # because headless mode skips ebiten.RunGame entirely.
      - name: Build headless Linux binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
          go build -o gvn-engine-headless ./cmd/game

      - name: Validate demo script (headless)
        run: ./gvn-engine-headless -headless -script scripts/demo.json

  # ── Job 3: Cross-compile Windows .exe ───────────────────────────────────
  build-windows:
    name: Build Windows .exe
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Cross-compile Windows .exe
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
          go build -ldflags="-s -w" -o gvn-engine.exe ./cmd/game

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: gvn-engine-windows
          path: gvn-engine.exe
          retention-days: 30

  # ── Job 4: Android APK (requires ebitenmobile + Android NDK) ────────────
  # This job runs on a self-hosted runner with Android SDK/NDK pre-installed.
  # To enable: uncomment and configure a self-hosted runner tagged "android".
  #
  # build-android:
  #   name: Build Android APK
  #   runs-on: [self-hosted, android]
  #   needs: test
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-go@v5
  #       with:
  #         go-version: '1.25'
