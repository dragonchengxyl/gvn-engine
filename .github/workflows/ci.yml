name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  # ── Job 1: Unit Tests ────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run pure-Go tests
        run: |
          go test \
            ./internal/compiler/ \
            ./internal/history/ \
            ./internal/ecs/ \
            ./internal/engine/ \
            -v -count=1

  # ── Job 2: Headless Script Validation ───────────────────────────────────
  validate-script:
    name: Headless Script Validation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build headless Linux binary
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
          go build -o gvn-engine-headless ./cmd/game

      - name: Validate demo script (headless)
        run: ./gvn-engine-headless -headless -script scripts/demo.json

  # ── Job 3: Cross-compile Windows .exe ───────────────────────────────────
  build-windows:
    name: Build Windows .exe
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cross-compile Windows .exe
        run: |
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 \
          go build -ldflags="-s -w" -o gvn-engine.exe ./cmd/game

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: gvn-engine-windows
          path: gvn-engine.exe
          retention-days: 30

  # ── Job 4: Android APK (requires ebitenmobile + Android NDK) ────────────
  # This job runs on a self-hosted runner with Android SDK/NDK pre-installed.
  # To enable: uncomment and configure a self-hosted runner tagged "android".
